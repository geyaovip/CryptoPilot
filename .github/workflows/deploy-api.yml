name: Deploy API Server

on:
  push:
    branches:
      - main
    paths:
      - "apps/api/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "package.json"
      - "pnpm-workspace.yaml"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

concurrency:
  group: api-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Sync and restart API server
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/cryptopilot_ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @cryptopilot/api db:generate

      - name: Typecheck API
        run: pnpm --filter @cryptopilot/api typecheck

      - name: Build API
        run: pnpm --filter @cryptopilot/api build

      - name: Validate deploy secrets
        env:
          API_DEPLOY_SSH_KEY: ${{ secrets.API_DEPLOY_SSH_KEY }}
          API_DEPLOY_SSH_KEY_B64: ${{ secrets.API_DEPLOY_SSH_KEY_B64 }}
          API_DEPLOY_HOST: ${{ secrets.API_DEPLOY_HOST }}
          API_DEPLOY_USER: ${{ secrets.API_DEPLOY_USER }}
          API_DEPLOY_PATH: ${{ secrets.API_DEPLOY_PATH }}
          API_HEALTH_URL: ${{ secrets.API_HEALTH_URL }}
        run: |
          test -n "$API_DEPLOY_SSH_KEY" || test -n "$API_DEPLOY_SSH_KEY_B64"
          test -n "$API_DEPLOY_HOST"
          test -n "$API_DEPLOY_USER"
          test -n "$API_DEPLOY_PATH"
          test -n "$API_HEALTH_URL"

      - name: Configure SSH and verify connectivity
        env:
          API_DEPLOY_SSH_KEY: ${{ secrets.API_DEPLOY_SSH_KEY }}
          API_DEPLOY_SSH_KEY_B64: ${{ secrets.API_DEPLOY_SSH_KEY_B64 }}
          API_DEPLOY_HOST: ${{ secrets.API_DEPLOY_HOST }}
          API_DEPLOY_PORT: ${{ secrets.API_DEPLOY_PORT }}
          API_DEPLOY_USER: ${{ secrets.API_DEPLOY_USER }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          key_file=~/.ssh/api_deploy_key
          port="${API_DEPLOY_PORT:-22}"

          load_key() {
            content="$1"
            mode="$2"
            if [ -z "$content" ]; then return 1; fi
            if [ "$mode" = "base64" ]; then
              printf '%s' "$content" | base64 -d > "$key_file" 2>/dev/null
            elif [ "$mode" = "escaped" ]; then
              printf '%b\n' "$content" | tr -d '\r' > "$key_file"
            else
              printf '%s\n' "$content" | tr -d '\r' > "$key_file"
            fi
            chmod 600 "$key_file"
            ssh-keygen -y -f "$key_file" >/dev/null 2>&1
          }

          if load_key "$API_DEPLOY_SSH_KEY_B64" "base64"; then
            echo "Loaded API_DEPLOY_SSH_KEY_B64 as base64 deploy key."
          elif load_key "$API_DEPLOY_SSH_KEY" "base64"; then
            echo "Loaded API_DEPLOY_SSH_KEY as base64 deploy key."
          elif load_key "$API_DEPLOY_SSH_KEY" "raw"; then
            echo "Loaded raw deploy key."
          elif load_key "$API_DEPLOY_SSH_KEY" "escaped"; then
            echo "Loaded single-line escaped deploy key."
          else
            echo "Missing or invalid API_DEPLOY_SSH_KEY_B64/API_DEPLOY_SSH_KEY."
            exit 1
          fi

          # Diagnostic: resolve host and check TCP reachability
          echo "--- Connectivity diagnostics ---"
          echo "Target: $API_DEPLOY_USER@$API_DEPLOY_HOST:$port"
          if command -v dig >/dev/null 2>&1; then
            dig +short "$API_DEPLOY_HOST" || echo "(DNS resolution failed)"
          elif command -v nslookup >/dev/null 2>&1; then
            nslookup "$API_DEPLOY_HOST" 2>&1 || echo "(DNS resolution failed)"
          fi
          for attempt in $(seq 1 3); do
            echo "TCP probe attempt $attempt to $API_DEPLOY_HOST:$port..."
            if timeout 15 bash -c "echo >/dev/tcp/$API_DEPLOY_HOST/$port" 2>/dev/null; then
              echo "TCP port $port is reachable."
              break
            else
              echo "TCP port $port not reachable (attempt $attempt)."
              if [ "$attempt" -lt 3 ]; then sleep 10; fi
            fi
          done

          # Write a stable SSH wrapper (avoids brittle $SSH_OPTS word-splitting in rsync -e)
          {
            echo '#!/usr/bin/env bash'
            echo "exec ssh -i \"$key_file\" -p \"$port\" \\"
            echo '  -o ControlMaster=auto \'
            echo '  -o ControlPath="${HOME}/.ssh/api-deploy-%r@%h:%p" \'
            echo '  -o ControlPersist=15m \'
            echo '  -o BatchMode=yes \'
            echo '  -o IdentitiesOnly=yes \'
            echo '  -o StrictHostKeyChecking=accept-new \'
            echo '  -o ConnectTimeout=45 \'
            echo '  -o ConnectionAttempts=3 \'
            echo '  -o TCPKeepAlive=yes \'
            echo '  -o ServerAliveInterval=30 \'
            echo '  -o ServerAliveCountMax=120 \'
            echo '  "$@"'
          } > ~/.ssh/deploy-ssh
          chmod +x ~/.ssh/deploy-ssh
          echo "DEPLOY_SSH=$HOME/.ssh/deploy-ssh" >> "$GITHUB_ENV"

          # Keyscan (non-fatal)
          ssh-keyscan -p "$port" -T 15 "$API_DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

          # Verify SSH with retries before rsync
          for attempt in $(seq 1 5); do
            echo "SSH verify attempt $attempt..."
            if "$HOME/.ssh/deploy-ssh" "$API_DEPLOY_USER@$API_DEPLOY_HOST" "echo SSH connection verified"; then
              exit 0
            fi
            if [ "$attempt" -lt 5 ]; then
              echo "SSH verify failed, retrying in 15s..."
              sleep 15
            fi
          done
          echo "SSH connection failed after 5 attempts."
          exit 255

      - name: Sync API release files
        env:
          API_DEPLOY_HOST: ${{ secrets.API_DEPLOY_HOST }}
          API_DEPLOY_USER: ${{ secrets.API_DEPLOY_USER }}
          API_DEPLOY_PATH: ${{ secrets.API_DEPLOY_PATH }}
        run: |
          set -euo pipefail
          for attempt in $(seq 1 3); do
            echo "rsync apps/api attempt $attempt..."
            if rsync -az --delete \
              --exclude node_modules \
              --exclude .turbo \
              --exclude .env \
              --exclude ".env*" \
              --exclude "*.test.ts" \
              --exclude "*.spec.ts" \
              -e "$DEPLOY_SSH" \
              apps/api/ "$API_DEPLOY_USER@$API_DEPLOY_HOST:$API_DEPLOY_PATH/apps/api/"; then
              exit 0
            fi
            sleep 15
          done
          exit 255

      - name: Sync shared packages
        env:
          API_DEPLOY_HOST: ${{ secrets.API_DEPLOY_HOST }}
          API_DEPLOY_USER: ${{ secrets.API_DEPLOY_USER }}
          API_DEPLOY_PATH: ${{ secrets.API_DEPLOY_PATH }}
        run: |
          set -euo pipefail
          for attempt in $(seq 1 3); do
            echo "rsync packages attempt $attempt..."
            if rsync -az --delete \
              --exclude node_modules \
              --exclude dist \
              --exclude .turbo \
              --exclude "*.test.ts" \
              --exclude "*.spec.ts" \
              -e "$DEPLOY_SSH" \
              packages/ "$API_DEPLOY_USER@$API_DEPLOY_HOST:$API_DEPLOY_PATH/packages/"; then
              exit 0
            fi
            sleep 15
          done
          exit 255

      - name: Sync workspace manifests
        env:
          API_DEPLOY_HOST: ${{ secrets.API_DEPLOY_HOST }}
          API_DEPLOY_USER: ${{ secrets.API_DEPLOY_USER }}
          API_DEPLOY_PATH: ${{ secrets.API_DEPLOY_PATH }}
        run: |
          set -euo pipefail
          for attempt in $(seq 1 3); do
            echo "rsync manifests attempt $attempt..."
            if rsync -az \
              -e "$DEPLOY_SSH" \
              package.json pnpm-lock.yaml pnpm-workspace.yaml \
              "$API_DEPLOY_USER@$API_DEPLOY_HOST:$API_DEPLOY_PATH/"; then
              exit 0
            fi
            sleep 15
          done
          exit 255

      - name: Install production dependencies
        env:
          API_DEPLOY_HOST: ${{ secrets.API_DEPLOY_HOST }}
          API_DEPLOY_USER: ${{ secrets.API_DEPLOY_USER }}
          API_DEPLOY_PATH: ${{ secrets.API_DEPLOY_PATH }}
        run: |
          set -euo pipefail
          remote_cmd="cd '$API_DEPLOY_PATH' && corepack enable && pnpm install --frozen-lockfile && pnpm --filter @cryptopilot/api db:generate && pnpm --filter @cryptopilot/api db:deploy"
          for attempt in $(seq 1 3); do
            echo "remote install attempt $attempt..."
            if "$DEPLOY_SSH" "$API_DEPLOY_USER@$API_DEPLOY_HOST" "$remote_cmd"; then
              exit 0
            fi
            sleep 15
          done
          exit 255

      - name: Restart API service
        env:
          API_DEPLOY_HOST: ${{ secrets.API_DEPLOY_HOST }}
          API_DEPLOY_USER: ${{ secrets.API_DEPLOY_USER }}
          API_DEPLOY_PATH: ${{ secrets.API_DEPLOY_PATH }}
          API_DEPLOY_SERVICE: ${{ secrets.API_DEPLOY_SERVICE }}
        run: |
          set -euo pipefail
          remote_cmd="sudo systemctl restart '${API_DEPLOY_SERVICE:-cryptopilot-api}'"
          for attempt in $(seq 1 3); do
            echo "remote restart attempt $attempt..."
            if "$DEPLOY_SSH" "$API_DEPLOY_USER@$API_DEPLOY_HOST" "$remote_cmd"; then
              exit 0
            fi
            sleep 15
          done
          exit 255

      - name: Verify API health
        env:
          API_HEALTH_URL: ${{ secrets.API_HEALTH_URL }}
        run: |
          set -euo pipefail

          health_urls=("$API_HEALTH_URL")
          if [ -n "$API_HEALTH_URL" ] && [ "${API_HEALTH_URL%/api/health}" = "$API_HEALTH_URL" ]; then
            health_urls+=("${API_HEALTH_URL%/}/api/health")
          fi
          health_urls+=("https://api.cryptopilot.chat/api/health")

          for attempt in $(seq 1 12); do
            for url in "${health_urls[@]}"; do
              if [ -z "$url" ]; then
                continue
              fi

              echo "Health check attempt ${attempt}: ${url}"
              if curl -fsS --max-time 10 "$url"; then
                exit 0
              fi
            done

            sleep 5
          done

          echo "API health check failed after retries."
          exit 1

      - name: Sync config to database
        env:
          API_DEPLOY_HOST: ${{ secrets.API_DEPLOY_HOST }}
          API_DEPLOY_USER: ${{ secrets.API_DEPLOY_USER }}
          API_DEPLOY_PATH: ${{ secrets.API_DEPLOY_PATH }}
        run: |
          set -euo pipefail
          remote_cmd="cd '$API_DEPLOY_PATH' && pnpm --filter @cryptopilot/api db:sync"
          for attempt in $(seq 1 3); do
            echo "remote db:sync attempt $attempt..."
            if "$DEPLOY_SSH" "$API_DEPLOY_USER@$API_DEPLOY_HOST" "$remote_cmd"; then
              exit 0
            fi
            sleep 15
          done
          exit 255
