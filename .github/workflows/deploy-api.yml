name: Deploy API Server

on:
  push:
    branches:
      - main
    paths:
      - "apps/api/**"
      - "packages/**"
      - "pnpm-lock.yaml"
      - "package.json"
      - "pnpm-workspace.yaml"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

concurrency:
  group: api-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Sync and restart API server
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/cryptopilot_ci

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @cryptopilot/api db:generate

      - name: Typecheck API
        run: pnpm --filter @cryptopilot/api typecheck

      - name: Validate deploy secrets
        env:
          API_DEPLOY_SSH_KEY: ${{ secrets.API_DEPLOY_SSH_KEY }}
          API_DEPLOY_SSH_KEY_B64: ${{ secrets.API_DEPLOY_SSH_KEY_B64 }}
          API_DEPLOY_HOST: ${{ secrets.API_DEPLOY_HOST }}
          API_DEPLOY_USER: ${{ secrets.API_DEPLOY_USER }}
          API_DEPLOY_PATH: ${{ secrets.API_DEPLOY_PATH }}
          API_HEALTH_URL: ${{ secrets.API_HEALTH_URL }}
        run: |
          test -n "$API_DEPLOY_SSH_KEY" || test -n "$API_DEPLOY_SSH_KEY_B64"
          test -n "$API_DEPLOY_HOST"
          test -n "$API_DEPLOY_USER"
          test -n "$API_DEPLOY_PATH"
          test -n "$API_HEALTH_URL"

      - name: Configure SSH
        env:
          API_DEPLOY_SSH_KEY: ${{ secrets.API_DEPLOY_SSH_KEY }}
          API_DEPLOY_SSH_KEY_B64: ${{ secrets.API_DEPLOY_SSH_KEY_B64 }}
          API_DEPLOY_HOST: ${{ secrets.API_DEPLOY_HOST }}
          API_DEPLOY_PORT: ${{ secrets.API_DEPLOY_PORT }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          key_file=~/.ssh/api_deploy_key

          load_key() {
            content="$1"
            mode="$2"

            if [ -z "$content" ]; then
              return 1
            fi

            if [ "$mode" = "base64" ]; then
              printf '%s' "$content" | base64 -d > "$key_file" 2>/dev/null
            elif [ "$mode" = "escaped" ]; then
              printf '%b\n' "$content" | tr -d '\r' > "$key_file"
            else
              printf '%s\n' "$content" | tr -d '\r' > "$key_file"
            fi

            chmod 600 "$key_file"
            ssh-keygen -y -f "$key_file" >/dev/null 2>&1
          }

          if load_key "$API_DEPLOY_SSH_KEY_B64" "base64"; then
            echo "Loaded API_DEPLOY_SSH_KEY_B64 as base64 deploy key."
          elif load_key "$API_DEPLOY_SSH_KEY" "base64"; then
            echo "Loaded API_DEPLOY_SSH_KEY as base64 deploy key."
          elif load_key "$API_DEPLOY_SSH_KEY" "raw"; then
            echo "Loaded raw deploy key."
          elif load_key "$API_DEPLOY_SSH_KEY" "escaped"; then
            echo "Loaded single-line escaped deploy key."
          else
            echo "Missing or invalid API_DEPLOY_SSH_KEY_B64/API_DEPLOY_SSH_KEY."
            exit 1
          fi

          ssh-keyscan -p "${API_DEPLOY_PORT:-22}" "$API_DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Verify SSH connection
        env:
          API_DEPLOY_HOST: ${{ secrets.API_DEPLOY_HOST }}
          API_DEPLOY_PORT: ${{ secrets.API_DEPLOY_PORT }}
          API_DEPLOY_USER: ${{ secrets.API_DEPLOY_USER }}
        run: |
          ssh \
            -i ~/.ssh/api_deploy_key \
            -p "${API_DEPLOY_PORT:-22}" \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            "$API_DEPLOY_USER@$API_DEPLOY_HOST" \
            "echo API deploy SSH connection verified"

      - name: Sync API release files
        env:
          API_DEPLOY_HOST: ${{ secrets.API_DEPLOY_HOST }}
          API_DEPLOY_PORT: ${{ secrets.API_DEPLOY_PORT }}
          API_DEPLOY_USER: ${{ secrets.API_DEPLOY_USER }}
          API_DEPLOY_PATH: ${{ secrets.API_DEPLOY_PATH }}
        run: |
          rsync -az --delete \
            --exclude node_modules \
            --exclude dist \
            --exclude .turbo \
            --exclude .env \
            --exclude ".env*" \
            --exclude "*.test.ts" \
            --exclude "*.spec.ts" \
            -e "ssh -i ~/.ssh/api_deploy_key -p ${API_DEPLOY_PORT:-22} -o BatchMode=yes -o IdentitiesOnly=yes" \
            apps/api/ "$API_DEPLOY_USER@$API_DEPLOY_HOST:$API_DEPLOY_PATH/apps/api/"

      - name: Sync shared packages
        env:
          API_DEPLOY_HOST: ${{ secrets.API_DEPLOY_HOST }}
          API_DEPLOY_PORT: ${{ secrets.API_DEPLOY_PORT }}
          API_DEPLOY_USER: ${{ secrets.API_DEPLOY_USER }}
          API_DEPLOY_PATH: ${{ secrets.API_DEPLOY_PATH }}
        run: |
          rsync -az --delete \
            --exclude node_modules \
            --exclude dist \
            --exclude .turbo \
            --exclude "*.test.ts" \
            --exclude "*.spec.ts" \
            -e "ssh -i ~/.ssh/api_deploy_key -p ${API_DEPLOY_PORT:-22} -o BatchMode=yes -o IdentitiesOnly=yes" \
            packages/ "$API_DEPLOY_USER@$API_DEPLOY_HOST:$API_DEPLOY_PATH/packages/"

      - name: Sync workspace manifests
        env:
          API_DEPLOY_HOST: ${{ secrets.API_DEPLOY_HOST }}
          API_DEPLOY_PORT: ${{ secrets.API_DEPLOY_PORT }}
          API_DEPLOY_USER: ${{ secrets.API_DEPLOY_USER }}
          API_DEPLOY_PATH: ${{ secrets.API_DEPLOY_PATH }}
        run: |
          rsync -az \
            -e "ssh -i ~/.ssh/api_deploy_key -p ${API_DEPLOY_PORT:-22} -o BatchMode=yes -o IdentitiesOnly=yes" \
            package.json pnpm-lock.yaml pnpm-workspace.yaml \
            "$API_DEPLOY_USER@$API_DEPLOY_HOST:$API_DEPLOY_PATH/"

      - name: Install production dependencies and restart API
        env:
          API_DEPLOY_HOST: ${{ secrets.API_DEPLOY_HOST }}
          API_DEPLOY_PORT: ${{ secrets.API_DEPLOY_PORT }}
          API_DEPLOY_USER: ${{ secrets.API_DEPLOY_USER }}
          API_DEPLOY_PATH: ${{ secrets.API_DEPLOY_PATH }}
          API_DEPLOY_SERVICE: ${{ secrets.API_DEPLOY_SERVICE }}
        run: |
          ssh -i ~/.ssh/api_deploy_key -p "${API_DEPLOY_PORT:-22}" -o BatchMode=yes -o IdentitiesOnly=yes "$API_DEPLOY_USER@$API_DEPLOY_HOST" \
            "cd '$API_DEPLOY_PATH' && corepack enable && pnpm install --frozen-lockfile && pnpm --filter @cryptopilot/api db:generate && pnpm --filter @cryptopilot/api build && sudo systemctl restart '${API_DEPLOY_SERVICE:-cryptopilot-api}'"

      - name: Fix English content in DB
        env:
          API_DEPLOY_HOST: ${{ secrets.API_DEPLOY_HOST }}
          API_DEPLOY_PORT: ${{ secrets.API_DEPLOY_PORT }}
          API_DEPLOY_USER: ${{ secrets.API_DEPLOY_USER }}
          API_DEPLOY_PATH: ${{ secrets.API_DEPLOY_PATH }}
        run: |
          ssh -i ~/.ssh/api_deploy_key -p "${API_DEPLOY_PORT:-22}" -o BatchMode=yes -o IdentitiesOnly=yes "$API_DEPLOY_USER@$API_DEPLOY_HOST" \
            "cd '$API_DEPLOY_PATH' && pnpm --filter @cryptopilot/api db:fix-english-data"
        timeout-minutes: 10

      - name: Verify API health
        env:
          API_HEALTH_URL: ${{ secrets.API_HEALTH_URL }}
        run: |
          set -euo pipefail

          health_urls=("$API_HEALTH_URL")
          if [ -n "$API_HEALTH_URL" ] && [ "${API_HEALTH_URL%/api/health}" = "$API_HEALTH_URL" ]; then
            health_urls+=("${API_HEALTH_URL%/}/api/health")
          fi
          health_urls+=("https://api.cryptopilot.chat/api/health")

          for attempt in $(seq 1 12); do
            for url in "${health_urls[@]}"; do
              if [ -z "$url" ]; then
                continue
              fi

              echo "Health check attempt ${attempt}: ${url}"
              if curl -fsS --max-time 10 "$url"; then
                exit 0
              fi
            done

            sleep 5
          done

          echo "API health check failed after retries."
          exit 1

      - name: Sync config to database
        env:
          API_DEPLOY_HOST: ${{ secrets.API_DEPLOY_HOST }}
          API_DEPLOY_PORT: ${{ secrets.API_DEPLOY_PORT }}
          API_DEPLOY_USER: ${{ secrets.API_DEPLOY_USER }}
          API_DEPLOY_PATH: ${{ secrets.API_DEPLOY_PATH }}
        run: |
          ssh -i ~/.ssh/api_deploy_key -p "${API_DEPLOY_PORT:-22}" -o BatchMode=yes -o IdentitiesOnly=yes "$API_DEPLOY_USER@$API_DEPLOY_HOST" \
            "cd '$API_DEPLOY_PATH' && pnpm --filter @cryptopilot/api db:sync"
