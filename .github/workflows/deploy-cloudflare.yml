name: Deploy Cloudflare Workers

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: cloudflare-workers-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy frontend workers
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.2.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @cryptopilot/api db:generate

      - name: Typecheck
        run: pnpm typecheck

      - name: Deploy web worker
        run: pnpm --filter @cryptopilot/web deploy:cloudflare

      - name: Deploy admin worker
        run: pnpm --filter @cryptopilot/admin deploy:cloudflare
