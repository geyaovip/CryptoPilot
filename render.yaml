services:
  - type: web
    name: cryptopilot-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: corepack enable && corepack prepare pnpm@11.2.2 --activate && pnpm install --frozen-lockfile && pnpm --filter @cryptopilot/api db:generate && pnpm --filter @cryptopilot/api build
    preDeployCommand: pnpm --filter @cryptopilot/api db:deploy && pnpm --filter @cryptopilot/api db:seed
    startCommand: pnpm --filter @cryptopilot/api start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: cryptopilot-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: cryptopilot-redis
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true
      - key: APP_URL
        sync: false
      - key: ADMIN_URL
        sync: false
      - key: LLM_DEFAULT
        value: mock
      - key: LLM_PROVIDER
        value: mock
      - key: LLM_ROUTE_AI_SEARCH
        value: mock
      - key: LLM_ROUTE_EMBEDDING
        value: mock

  - type: keyvalue
    name: cryptopilot-redis
    plan: free
    ipAllowList: []

databases:
  - name: cryptopilot-postgres
    plan: free
    databaseName: cryptopilot
    user: cryptopilot
