services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: cryptopilot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cryptopilot
      POSTGRES_PASSWORD: cryptopilot_dev_password
      POSTGRES_DB: cryptopilot
    ports:
      - "5432:5432"
    volumes:
      - cryptopilot_postgres_data:/var/lib/postgresql/data
      - ./infra/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cryptopilot -d cryptopilot"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cryptopilot-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - cryptopilot_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  cryptopilot_postgres_data:
  cryptopilot_redis_data:
